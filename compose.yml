
services:
  database:
    container_name: catalog_db
    image: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  basketdb:
    image: redis:alpine
    ports:
      - "6379:6379"

  discountdb:
    image: postgres

  pgadmin:
    image: dpage/pgadmin4:snapshot

  catalog.api:
    build: 
      context: .
      dockerfile: catalog.API/Dockerfile 
    ports:
      - "8080:8080"
    depends_on:
      - database

  basket.api:
    build: 
      context: .
      dockerfile: Basket.API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - CacheSettings:ConnectionString=basketdb:6379
    ports:
      - "5000:8080"
    depends_on:
      - basketdb
  
  discount.api:
    build:
      context: .
      dockerfile: Dicount.API/Dockerfile
    enviroment:
    ports:
      - "8081:8080"
    depends_on:
      - discountdb
    

volumes:
  mongo_data:
  postgres_data:
  pgadmin_data: